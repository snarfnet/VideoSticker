name: VideoSticker
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.videosticker
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    TARGETED_DEVICE_FAMILY: 1
targets:
  VideoSticker:
    type: application
    platform: iOS
    sources:
      - VideoSticker
    info:
      path: VideoSticker/Info.plist
      properties:
        CFBundleDisplayName: 動画スタンプ
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "お辞儀や挨拶の動きを撮影して、動くスタンプを作るためにカメラを使います。"
        NSMicrophoneUsageDescription: "動画撮影のためにマイクを使います（音声はスタンプには使いません）。"
        NSPhotoLibraryUsageDescription: "アルバムの動画から動くスタンプを作るために使います。"
        NSPhotoLibraryAddUsageDescription: "作った動くスタンプを写真に保存するために使います。"
        UIUserInterfaceStyle: Light
        ITSAppUsesNonExemptEncryption: false
